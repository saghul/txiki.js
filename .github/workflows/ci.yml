name: CI

on:
  pull_request:
    paths-ignore:
      - 'website/**'
      - 'types/**'

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: actions/setup-node@v6
      with:
        check-latest: true
        node-version-file: '.nvmrc'
    - name: Install dependencies
      run: |
        npm install
        sudo apt update
        sudo apt install -y clang-format
        clang-format --version
    - name: Run the linter
      run: npm run lint
    - name: Run the formatter
      run: clang-format -i src/*.{c,h}
    - name: Check if the tree is dirty
      run: $(exit $(git status --porcelain --untracked-files=no | head -255 | wc -l)) || (echo "Dirty git tree"; git diff; exit 1)
  codegen:
    name: Codegen
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
      - uses: actions/setup-node@v6
        with:
          check-latest: true
          node-version-file: '.nvmrc'
      - name: Install dependencies
        run: |
          npm install
      - name: Build it
        run: |
          make js
      - name: Check if the git repository is clean
        run: $(exit $(git status --porcelain --untracked-files=no | head -255 | wc -l)) || (echo "Dirty git tree"; git diff; exit 1)
  build-linux:
    name: Linux (${{ matrix.buildType }}, ${{ matrix.compiler }}, mimalloc=${{ matrix.mimalloc }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        buildType: [Debug, Release]
        compiler: [gcc, clang]
        mimalloc: [ON, OFF]
    env:
      BUILDTYPE: ${{ matrix.buildType }}
      MIMALLOC: ${{ matrix.mimalloc }}
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
    - name: Dependencies
      env:
        ACTIONS_ALLOW_UNSECURE_COMMANDS: 'true'
      run: |
        sudo apt update
        sudo apt install -y libffi-dev
        if [ "${{ matrix.compiler }}" = "clang" ]; then
          sudo apt install -y clang
          echo "::set-env name=CC::clang"
          echo "::set-env name=CXX::clang++"
        fi
    - name: Build it
      run: make VERBOSE=1
    - name: Download esbuild
      run: ./build/tjs bundle tests/helpers/bundle-input.js /tmp/warm.js && rm -f /tmp/warm.js
    - name: Test it
      run: make test
    - name: Test it (advanced)
      run: make test-advanced
  build-macos:
    name: macOS (${{ matrix.buildType }}, ${{ matrix.os }}, mimalloc=${{ matrix.mimalloc }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        buildType: [Debug, Release]
        os: [macos-15, macos-15-intel]
        mimalloc: [ON, OFF]
    env:
      BUILDTYPE: ${{ matrix.buildType }}
      MIMALLOC: ${{ matrix.mimalloc }}
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
    - name: Build it
      run: make VERBOSE=1
    - name: Download esbuild
      run: ./build/tjs bundle tests/helpers/bundle-input.js /tmp/warm.js && rm -f /tmp/warm.js
    - name: Test it
      run: make test
    - name: Test it (advanced)
      run: make test-advanced
  build-alpine:
    name: Alpine Linux (${{ matrix.buildType }}, mimalloc=${{ matrix.mimalloc }})
    runs-on: ubuntu-latest
    container: alpine:edge
    strategy:
      fail-fast: false
      matrix:
        buildType: [Debug, Release]
        mimalloc: [ON, OFF]
    env:
      BUILDTYPE: ${{ matrix.buildType }}
      MIMALLOC: ${{ matrix.mimalloc }}
    steps:
    - name: Prepare
      run: apk add git build-base cmake linux-headers libffi-dev --update-cache
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
    - name: Build it
      run: make VERBOSE=1
    - name: Download esbuild
      run: ./build/tjs bundle tests/helpers/bundle-input.js /tmp/warm.js && rm -f /tmp/warm.js
    - name: Test it
      run: make test
  build-windows:
    name: Windows (${{ matrix.buildType }}, mimalloc=${{ matrix.mimalloc }})
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        buildType: [Debug, Release]
        mimalloc: [ON, OFF]
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: '66c0373dc7fca549e5803087b9487edfe3aca0a1'
    - name: Install dependencies
      run: vcpkg install libffi:x64-windows-static
    - name: Configure
      run: |
        cmake -B build -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static -DBUILD_WITH_MIMALLOC=${{ matrix.mimalloc }}
    - name: Build
      run: cmake --build build --config ${{ matrix.buildType }}
    - name: Download esbuild
      run: |
        $env:PATH = "${{ github.workspace }}\build\${{ matrix.buildType }};${{ github.workspace }}\vcpkg\installed\x64-windows\bin;$env:PATH"
        .\build\${{ matrix.buildType }}\tjs.exe bundle tests\helpers\bundle-input.js $env:TEMP\warm.js
        Remove-Item $env:TEMP\warm.js -ErrorAction SilentlyContinue
    - name: Test
      run: |
        $env:PATH = "${{ github.workspace }}\build\${{ matrix.buildType }};${{ github.workspace }}\vcpkg\installed\x64-windows\bin;$env:PATH"
        if ("${{ matrix.buildType }}" -eq "Debug") { $env:TJS_TEST_TIMEOUT = "120000" }
        .\build\${{ matrix.buildType }}\tjs.exe test tests/
  asan-linux:
    name: ASAN (Linux)
    runs-on: ubuntu-latest
    env:
      CC: clang
      CXX: clang++
      ASAN_OPTIONS: detect_leaks=0
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
    - name: Dependencies
      run: |
        sudo apt update
        sudo apt install -y clang libffi-dev
    - name: Build
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_WITH_MIMALLOC=OFF -DBUILD_WITH_ASAN=ON
        cmake --build build -j $(getconf _NPROCESSORS_ONLN)
    - name: Download esbuild
      run: ./build/tjs bundle tests/helpers/bundle-input.js /tmp/warm.js && rm -f /tmp/warm.js
    - name: Test
      run: ./build/tjs --stack-size 8388608 --wasm-stack-size 2097152 test tests/
  asan-macos:
    name: ASAN (macOS)
    runs-on: macos-15
    env:
      ASAN_OPTIONS: detect_leaks=0
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - uses: actions/setup-node@v6
      with:
        node-version-file: '.nvmrc'
    - name: Build
      run: |
        cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo -DBUILD_WITH_MIMALLOC=OFF -DBUILD_WITH_ASAN=ON
        cmake --build build -j $(sysctl -n hw.ncpu)
    - name: Download esbuild
      run: ./build/tjs bundle tests/helpers/bundle-input.js /tmp/warm.js && rm -f /tmp/warm.js
    - name: Test
      run: ./build/tjs --stack-size 8388608 --wasm-stack-size 2097152 test tests/
  asan-windows:
    name: ASAN (Windows)
    runs-on: windows-latest
    env:
      VCPKG_DEFAULT_TRIPLET: x64-windows
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
    steps:
    - uses: actions/checkout@v6
      with:
        submodules: recursive
    - name: Setup vcpkg
      uses: lukka/run-vcpkg@v11
      with:
        vcpkgGitCommitId: '66c0373dc7fca549e5803087b9487edfe3aca0a1'
    - name: Install dependencies
      run: vcpkg install libffi:x64-windows-static
    - name: Configure
      run: |
        cmake -B build -DCMAKE_TOOLCHAIN_FILE=${{ github.workspace }}/vcpkg/scripts/buildsystems/vcpkg.cmake -DVCPKG_TARGET_TRIPLET=x64-windows-static -DBUILD_WITH_MIMALLOC=OFF -DBUILD_WITH_ASAN=ON
    - name: Build
      run: cmake --build build --config RelWithDebInfo
    - name: Download esbuild
      run: |
        $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
        $clangDir = Get-ChildItem "$vsPath\VC\Tools\MSVC\*\bin\Hostx64\x64" -Directory | Select-Object -Last 1
        $env:PATH = "$clangDir;${{ github.workspace }}\build\RelWithDebInfo;${{ github.workspace }}\vcpkg\installed\x64-windows\bin;$env:PATH"
        .\build\RelWithDebInfo\tjs.exe bundle tests\helpers\bundle-input.js $env:TEMP\warm.js
        Remove-Item $env:TEMP\warm.js -ErrorAction SilentlyContinue
    - name: Test
      env:
        ASAN_OPTIONS: detect_leaks=0
        TJS_TEST_TIMEOUT: "120000"
      run: |
        $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
        $clangDir = Get-ChildItem "$vsPath\VC\Tools\MSVC\*\bin\Hostx64\x64" -Directory | Select-Object -Last 1
        $env:PATH = "$clangDir;${{ github.workspace }}\build\RelWithDebInfo;${{ github.workspace }}\vcpkg\installed\x64-windows\bin;$env:PATH"
        .\build\RelWithDebInfo\tjs.exe --stack-size 8388608 --wasm-stack-size 2097152 test tests/
