[package]
name = "oxc-transpiler"
version = "0.1.0"
edition = "2021"

[lib]
crate-type = ["cdylib"]

[dependencies]
oxc_allocator = "0.136.0"
oxc_parser = "0.136.0"
oxc_codegen = "0.136.0"
oxc_ast = "0.136.0"
oxc_span = "0.136.0"
oxc_semantic = "0.136.0"
oxc_transformer = "0.136.0"
serde_json = "1"
serde = { version = "1", features = ["derive"] }

[profile.release]
opt-level = "z"
lto = true
strip = true
codegen-units = 1
panic = "abort"
